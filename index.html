<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video & Image Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }
        h2 { margin-top: 0; }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        
        #result-container {
            margin-top: 25px;
            text-align: center;
        }
        video, img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
        .loading {
            display: none;
            color: #007bff;
            font-weight: bold;
            margin-top: 15px;
        }
        .error {
            color: red;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Generate Media</h2>
    <p>Select a model, enter your prompt, and provide your Replicate API key. Billing is handled through your own account.</p>

    <label for="apiKey">Your Replicate API Key:</label>
    <input type="password" id="apiKey" placeholder="r8_..." required>

    <label for="modelSelect">Choose a Model:</label>
    <select id="modelSelect">
        <option value="luma/ray">Video: Luma Ray (High Quality)</option>
        <option value="minimax/video-01">Video: MiniMax</option>
        <option value="black-forest-labs/flux-schnell">Image: Flux Schnell (Fast)</option>
    </select>

    <label for="prompt">What do you want to see?</label>
    <textarea id="prompt" rows="3" placeholder="A cinematic shot of a futuristic city..." required></textarea>

    <button id="generateBtn" onclick="generateMedia()">Generate</button>

    <div id="loading" class="loading">Generating your media... This may take a minute or two.</div>
    <div id="error" class="error"></div>
    
    <div id="result-container"></div>
</div>

<script>
    async function generateMedia() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('prompt').value.trim();
        const model = document.getElementById('modelSelect').value;
        const btn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const resultContainer = document.getElementById('result-container');

        // Clear previous results and errors
        errorDiv.innerText = '';
        resultContainer.innerHTML = '';

        if (!apiKey || !prompt) {
            errorDiv.innerText = "Please provide both an API key and a prompt.";
            return;
        }

        // Update UI to loading state
        btn.disabled = true;
        loading.style.display = 'block';

        try {
            // Note: If you are hosting the frontend on GitHub Pages, you must change 
            // '/generate-video' to the full URL of where your Node.js backend is hosted 
            // (e.g., 'https://your-backend-app.onrender.com/generate-video')
            const response = await fetch('/generate-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userApiKey: apiKey, 
                    prompt: prompt,
                    model: model 
                })
            });

            const data = await response.json();

            if (!data.success) {
                throw new Error(data.error || "Generation failed.");
            }

            // Display the result (Handle both Images and Videos)
            const mediaUrl = data.videoUrl; // Ensure your backend passes the URL here
            
            if (model.includes("flux")) {
                // It's an image model
                resultContainer.innerHTML = `<img src="${mediaUrl}" alt="Generated Image">`;
            } else {
                // It's a video model
                resultContainer.innerHTML = `<video controls autoplay loop><source src="${mediaUrl}" type="video/mp4">Your browser does not support the video tag.</video>`;
            }

        } catch (error) {
            errorDiv.innerText = error.message;
        } finally {
            // Reset UI
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
